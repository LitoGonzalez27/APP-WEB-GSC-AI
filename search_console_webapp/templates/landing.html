  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-accent: #d9f9b8;
      --color-text-primary: #0F172A;
      --color-text-secondary: #64748B;
      --color-text-tertiary: #94A3B8;
      --color-bg-paper: #FFFFFF;
      --color-bg-subtle: #F1F5F9;
      --color-border: #E2E8F0;
      --font-sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: 'Libre Baskerville', 'Georgia', serif;
      --radius-md: 20px;
      --radius-full: 9999px;
      --shadow-md: 0 2px 4px rgba(15,23,42,0.04), 0 8px 24px rgba(15,23,42,0.08);
      --shadow-float: 0 8px 16px rgba(15,23,42,0.08), 0 30px 60px rgba(15,23,42,0.16);
      --ease-brand: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    body {
      font-family: var(--font-sans);
      line-height: 1.6;
      color: var(--color-text-primary);
      background: var(--color-bg-paper);
      min-height: 100vh;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: clamp(2rem, 6vw, 4rem);
      background: var(--color-bg-paper);
      overflow: hidden;
    }

    /* Dot grid pattern — brandbook 11.3 */
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 1px 1px, #CBD5E1 1px, transparent 0);
      background-size: 32px 32px;
      opacity: 0.3;
      pointer-events: none;
    }

    .hero-content {
      max-width: 720px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      margin-bottom: clamp(2rem, 4vw, 3rem);
    }

    .brand-logo img {
      height: 36px;
      width: auto;
    }

    .hero h1 {
      font-family: var(--font-sans);
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--color-text-primary);
      margin-bottom: 1.5rem;
    }

    /* Serif accent word — brandbook 11.2 */
    .hero h1 .accent {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      position: relative;
    }

    .hero h1 .accent::after {
      content: '';
      position: absolute;
      bottom: 0.1em;
      left: -6px;
      right: -6px;
      height: 0.4em;
      background: var(--color-accent);
      opacity: 0.85;
      transform: rotate(-1.5deg);
      z-index: -1;
    }

    .hero p {
      font-size: clamp(1rem, 1.5vw, 1.15rem);
      font-weight: 400;
      color: var(--color-text-secondary);
      line-height: 1.75;
      margin-bottom: clamp(2rem, 4vw, 3rem);
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    /* Buttons — brandbook 09 */
    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: var(--radius-full);
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.3s var(--ease-brand), box-shadow 0.3s var(--ease-brand);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
    }

    /* Primary button — dark */
    .btn-primary {
      background: var(--color-text-primary);
      color: #F8FAFC;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-float);
    }

    /* Secondary button — outline */
    .btn-secondary {
      background: transparent;
      color: var(--color-text-primary);
      border: 1.5px solid var(--color-border);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* Features eyebrow — brandbook eyebrow style */
    .features-row {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 600px;
      margin: 0 auto;
    }

    .feature-tag {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-tertiary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .feature-tag svg {
      width: 16px;
      height: 16px;
      stroke: var(--color-text-tertiary);
      stroke-width: 2;
      fill: none;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: clamp(1.6rem, 5vw, 2.2rem);
      }
      .hero p {
        font-size: 0.95rem;
      }
      .cta-buttons {
        flex-direction: column;
        align-items: center;
      }
      .btn {
        width: 100%;
        max-width: 280px;
      }
      .features-row {
        gap: 1rem;
      }
    }
  </style>
</head>
