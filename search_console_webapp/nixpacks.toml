[phases.setup]
nixPkgs = ["python3", "gcc"]

# Native libs required by Playwright Chromium on Ubuntu noble (24.04).
# Installing them here (setup phase) means they are cached independently
# and NEVER re-fetched unless nixpacks.toml itself changes.
# This avoids the transient "mirror sync in progress" apt failures that
# `playwright install --with-deps` triggers on every build.
aptPkgs = [
    "libnss3", "libnspr4", "libdbus-1-3",
    "libatk1.0-0t64", "libatk-bridge2.0-0t64",
    "libcups2t64", "libdrm2",
    "libxcomposite1", "libxdamage1", "libxext6",
    "libxfixes3", "libxrandr2",
    "libgbm1", "libxkbcommon0", "libxshmfence1",
    "libpango-1.0-0", "libcairo2",
    "libasound2t64", "libatspi2.0-0t64",
    "fonts-liberation", "fonts-noto-color-emoji"
]

# Install phase: pip deps + Chromium binary (no --with-deps needed anymore,
# apt packages are already present from the setup phase above).
# Cached based on requirements.txt — only re-runs when Python deps change.
[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install -r requirements.txt",
    ". /opt/venv/bin/activate && python3 -m playwright install chromium"
]

[phases.start]
cmd = "python3 app.py"
